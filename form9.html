<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form 9 - Music Survey</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <nav class="nav">
            <a class="brand" href="index.html">Ahmet Faruk Sever</a>
            <div class="nav-links">
                <a href="hw9.html">HW9</a>
                <a href="hw9.pdf">PDF</a>
                <a href="index.html">Home</a>
            </div>
        </nav>
    </header>

    <main class="page content-page">
        <header>
            <p class="eyebrow">form9.html</p>
            <h1>Music Survey</h1>
            <p class="lead">This form uses text, e-mail, textarea, radio, checkbox, select, submit, reset, fieldset, and legend elements.</p>
        </header>

        <section class="card">
            <form method="post" action="http://www.uyar.com/teaching/ecc006/2017spring/login.php">
                <div>
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div>
                    <label for="email">E-mail Address</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div>
                    <label for="comments">What role does music play in your day?</label>
                    <textarea id="comments" name="comments" cols="60" rows="3"></textarea>
                </div>

                <fieldset>
                    <legend>How often do you listen to music?</legend>
                    <label class="choice"><input type="radio" name="frequency" value="daily"> Daily</label>
                    <label class="choice"><input type="radio" name="frequency" value="weekly"> Weekly</label>
                    <label class="choice"><input type="radio" name="frequency" value="occasionally"> Occasionally</label>
                </fieldset>

                <fieldset>
                    <legend>Where do you listen to music?</legend>
                    <label class="choice"><input type="checkbox" name="place" value="home"> At home</label>
                    <label class="choice"><input type="checkbox" name="place" value="school"> At school</label>
                    <label class="choice"><input type="checkbox" name="place" value="travel"> While traveling</label>
                </fieldset>

                <div>
                    <label for="genre">Favorite Music Genre</label>
                    <select id="genre" name="genre" size="3">
                        <option value="pop">Pop</option>
                        <option value="rock">Rock</option>
                        <option value="rap">Rap</option>
                        <option value="electronic">Electronic</option>
                        <option value="classical">Classical</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit">Submit Survey</button>
                    <button type="reset">Reset Form</button>
                </div>
            </form>
        </section>

        <a class="home-link" href="index.html">Back to Home</a>
    </main>
</body>
</html>
